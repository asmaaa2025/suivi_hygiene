name: bekkapp
description: "Application de suivi d'hygiène alimentaire"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI / Core
  cupertino_icons: ^1.0.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  auto_size_text: ^3.0.0
  intl: ^0.18.1

  # Utils
  path: ^1.8.3
  uuid: ^4.0.0
  characters: ^1.3.0
  mime: ^1.0.4

  # Files / Media
  file_picker: ^10.1.9
  image_picker: ^1.0.7
  image: ^4.1.7
  open_filex: ^4.0.2
  pdf: ^3.10.7
  printing: ^5.11.1
  csv: ^5.0.2
  share_plus: ^7.2.1

  # Storage / Local DB
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  sqflite: ^2.3.3+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network / Backend
  http: ^1.1.0
  connectivity_plus: ^6.0.5
  supabase_flutter: ^2.5.6

  # Config / Env
  flutter_dotenv: ^5.1.0

  # Routing & State
  go_router: ^14.2.7
  flutter_riverpod: ^2.5.1

  # Hardware
  blue_thermal_printer: ^1.2.3
  flutter_document_scanner: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/logos/
    - assets/images/
